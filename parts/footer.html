<!--
	Footer template part.

	Template parts are static HTML fragments — they cannot run PHP at
	render time. Anything that needs dynamic content (current year, site
	owner, post counts, i18n with runtime data) must live in a pattern,
	which is a PHP file. Parts reference patterns; patterns carry the
	logic.

	Example below: the copyright line is dynamic (year + site title) so
	it lives in patterns/_copyright.php, and this part only wires it in.
-->
<!-- wp:group {"align":"wide","layout":{"type":"flex","justifyContent":"space-between","flexWrap":"wrap","verticalAlignment":"center"}} -->
<div class="wp-block-group alignwide">
	<!-- wp:site-title /-->

	<!-- wp:pattern {"slug":"wp-starter/_copyright"} /-->

	<!-- wp:navigation {"overlayMenu":"never","layout":{"type":"flex","justifyContent":"right","orientation":"horizontal"}} /-->
</div>
<!-- /wp:group -->
