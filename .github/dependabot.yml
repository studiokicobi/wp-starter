version: 2
updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 5
      groups:
          dev-dependencies:
              dependency-type: development
              update-types:
                  - minor
                  - patch

    - package-ecosystem: composer
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 5
      groups:
          dev-dependencies:
              dependency-type: development
              update-types:
                  - minor
                  - patch

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 5
